name: Quality checks

on:
  push:
    branches:
      - main
      - registration-prep
  pull_request:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest ruff mypy reportlab pyyaml

      - name: Ruff format
        run: python -m ruff format --check .

      - name: Ruff lint
        run: python -m ruff check .

      - name: Targeted mypy
        run: python -m mypy bike_router/api.py bike_router/models.py bike_router/config.py registration/scripts

      - name: Registration abstract
        run: |
          python -m registration.scripts.calculate_program_size
          python -m registration.scripts.check_abstract

      - name: Generate deposited materials
        run: |
          python -m registration.scripts.generate_deposit_pdf
          test -s registration/private/02_deposit.pdf

      - name: Upload deposited PDF
        uses: actions/upload-artifact@v4
        with:
          name: deposited-materials
          path: registration/private/02_deposit.pdf

      - name: Pytest
        run: |
          set -o pipefail
          python -m pytest -x -vv --tb=long 2>&1 | tee pytest.log

      - name: Upload pytest log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log
          path: pytest.log

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
