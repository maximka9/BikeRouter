# Пример reverse proxy для Bike Router (TLS — certbot или свои сертификаты).
# Подставьте server_name и пути к сертификатам.

upstream bike_router_backend {
    server 127.0.0.1:8000;
    keepalive 16;
}

server {
    listen 443 ssl http2;
    server_name router.example.org;

    ssl_certificate     /etc/letsencrypt/live/router.example.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/router.example.org/privkey.pem;

    client_max_body_size 1m;

    location / {
        proxy_pass         http://bike_router_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout  120s;
        proxy_connect_timeout 10s;
    }
}

server {
    listen 80;
    server_name router.example.org;
    return 301 https://$host$request_uri;
}
